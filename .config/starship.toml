# Don't print a new line at the start of the prompt
add_newline = false
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols  оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—
# Cool stuff у°ңҘ о©ұ пҒӢ пҖҚ

# format = """
# $directory $fill $git_branch $cmd_duration
# $character"""
format = """
$cmd_duration $directory$git_branch$python$nodejs
$character
"""

[fill]
symbol = '-'
style = 'fg:8'

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]
success_symbol = "[  вқҜ](bold fg:10)"
error_symbol = "[  вқҜ](bold fg:9)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:13"
symbol = "у°ҳ¬"
truncation_length = 100
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:13)[$symbol $branch(:$remote_branch)](fg:0 bg:13)[оӮҙ ](bold fg:13)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold fg:9)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](fg:10)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:13 bold fg:0)[оӮҙ](bold fg:13)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed fg:10"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:13 fg:0"
style_root = "bold fg:9"
format = "[оӮ¶](bold fg:13)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:12 fg:0"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:12)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:12)'

[python]
symbol = "оҲө"
style = "bg:11 fg:0"
format = " [оӮ¶](bold fg:11)[$symbol $version( $virtualenv)]($style)[оӮҙ](bold fg:11)"
python_binary = "python3"

[nodejs]
symbol = "оңҳ"
style = "bg:10 fg:0"
format = " [оӮ¶](bold fg:10)[$symbol $version]($style)[оӮҙ](bold fg:10)"

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:8)[у°Әў $duration](bold bg:8 fg:15)[оӮҙ](bold fg:8)'

